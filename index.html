<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Video Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
     <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9690701171677848"
         crossorigin="anonymous"></script>
    <style>
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .glass-dark {
            background: rgba(30, 30, 35, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body {
            background: #0f1115;
            color: #e5e7eb;
            min-height: 100vh;
        }
        /* Custom Gradient Styling */
        .btn-gradient {
            background: linear-gradient(to right, #ffb6c1, #800080);
            transition: all 0.3s ease;
            color: white;
            border: none;
        }
        .btn-gradient:hover:not(:disabled) {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
        }
        .btn-gradient:active:not(:disabled) {
            transform: translateY(0);
        }
        .btn-gradient:disabled {
            background: #374151; /* Gray for disabled state */
            opacity: 0.5;
            cursor: not-allowed;
        }
        .control-icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .control-icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Volume Input Styling */
        .volume-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .flash-red {
            border-color: #ef4444 !important;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }
    </style>
</head>
<body class="relative flex flex-col items-center justify-center p-4 md:p-8">

    <!-- Home Button (Top Right) -->
    <a href="https://selectv.pages.dev/" class="fixed top-6 right-6 z-50 btn-gradient px-5 py-2 rounded-full font-semibold text-sm shadow-lg flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
    </a>

    <div class="max-w-4xl w-full space-y-6">
        <!-- Header -->
        <div class="text-center space-y-2">
            <h1 class="text-2xl md:text-3xl font-bold text-white tracking-tight">Video Explorer</h1>
            <p class="text-gray-400 text-sm md:text-base">Watching: <span id="video-title" class="text-indigo-300">Loading...</span></p>
        </div>

        <!-- Player Section -->
        <div class="video-container" id="player-wrapper">
            <div id="player"></div>
        </div>

        <!-- Controls UI -->
        <div class="glass-dark p-6 rounded-3xl space-y-6">
            
            <!-- Secondary Playback Controls (Play/Pause/Skim) -->
            <div class="flex items-center justify-center gap-6">
                <!-- Back 15s -->
                <button id="back-15" class="control-icon-btn p-3 rounded-full text-gray-300" title="Back 15s">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg>
                </button>

                <!-- Play/Pause -->
                <button id="play-pause" class="w-16 h-16 flex items-center justify-center btn-gradient rounded-full shadow-lg transition-all active:scale-95">
                    <span id="play-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </span>
                    <span id="pause-icon" class="hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    </span>
                </button>

                <!-- Forward 15s -->
                <button id="forward-15" class="control-icon-btn p-3 rounded-full text-gray-300" title="Forward 15s">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m13 17 5-5-5-5M6 17l5-5-5-5"/></svg>
                </button>
            </div>

            <!-- Single Video Controls -->
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4 pt-4 border-t border-white/5">
                <button id="replay-btn" class="w-full sm:w-auto px-6 py-2.5 btn-gradient rounded-xl flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    Replay Video
                </button>

                <div class="flex items-center gap-2 w-full sm:w-auto">
                    <span class="text-xs font-mono text-gray-500 uppercase tracking-widest mr-2">Volume:</span>
                    <!-- Volume Input -->
                    <div class="relative flex items-center">
                        <input type="number" id="volume-input" min="0" max="100" placeholder="Vol" class="volume-input w-16 px-2 py-2.5 rounded-xl text-center text-sm focus:outline-none" title="Type volume (1-100) and press Enter">
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center">
            <a id="original-link" href="#" target="_blank" class="text-[10px] uppercase tracking-widest text-gray-600 hover:text-pink-400 transition-colors">
                View Original Video on YouTube
            </a>
        </div>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        // EDIT THIS VIDEO ID
        const targetVideoId = 'O1KESK7UzjY'; 
        
        const titleEl = document.getElementById('video-title');
        const playPauseBtn = document.getElementById('play-pause');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const volumeInput = document.getElementById('volume-input');
        const replayBtn = document.getElementById('replay-btn');
        const originalLink = document.getElementById('original-link');

        // Set the link in the footer
        originalLink.href = `https://www.youtube.com/watch?v=${targetVideoId}`;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: targetVideoId,
                playerVars: {
                    'autoplay': 0,
                    'controls': 1,
                    'rel': 0,
                    'modestbranding': 1,
                    'enablejsapi': 1,
                    'origin': location.origin
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerReady(event) {
            volumeInput.value = player.getVolume();
            updateUI();
        }

        function onPlayerError(event) {
            console.error("YouTube Player Error:", event.data);
            titleEl.textContent = "Error loading video.";
        }

        function onPlayerStateChange(event) {
            updateUI();
            if (event.data === YT.PlayerState.PLAYING) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        }

        function updateUI() {
            if (!player || typeof player.getVideoData !== 'function') return;

            const videoData = player.getVideoData();
            if (videoData && videoData.title) {
                titleEl.textContent = videoData.title;
            }
        }

        playPauseBtn.addEventListener('click', () => {
            if (!player) return;
            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        });

        replayBtn.addEventListener('click', () => {
            if (!player) return;
            player.seekTo(0);
            player.playVideo();
        });

        document.getElementById('back-15').addEventListener('click', () => {
            if (!player) return;
            const currentTime = player.getCurrentTime();
            player.seekTo(Math.max(currentTime - 15, 0), true);
        });

        document.getElementById('forward-15').addEventListener('click', () => {
            if (!player) return;
            const currentTime = player.getCurrentTime();
            player.seekTo(currentTime + 15, true);
        });

        // Volume logic
        volumeInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                let val = parseInt(volumeInput.value);
                if (isNaN(val)) val = 100;
                val = Math.max(0, Math.min(100, val));
                
                if (player && typeof player.setVolume === 'function') {
                    player.setVolume(val);
                    
                    // Flash red effect
                    volumeInput.classList.add('flash-red');
                    setTimeout(() => {
                        volumeInput.classList.remove('flash-red');
                    }, 500);
                }
            }
        });

        setInterval(updateUI, 2000);
    </script>
</body>
</html>
